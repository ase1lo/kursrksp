services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corplink
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d corplink"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  messenger:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://messenger:messenger@db:5432/corplink
      SECRET_KEY: ${SECRET_KEY:-local-compose-secret}
      TOKEN_TTL_SECONDS: 86400
      CORS_ORIGIN: "*"

volumes:
  postgres-data:
