services:
  messenger:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: 8080
      DATABASE_URL: sqlite:////app/data/messenger.db
      SECRET_KEY: ${SECRET_KEY:-local-compose-secret}
      TOKEN_TTL_SECONDS: 86400
      CORS_ORIGIN: "*"
    volumes:
      - messenger-data:/app/data

volumes:
  messenger-data:
